<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Rising Waters</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .auth-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #00d2ff;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }
        .auth-footer {
            margin-top: 20px;
            text-align: center;
            color: #aaa;
        }
        .auth-footer a {
            color: #00d2ff;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="home-page">
    <div class="rain-container" id="rainContainer"></div>
    
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">🌊</span>
            <span class="nav-title">Rising Waters</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/login" class="nav-link">Login</a>
            <a href="/register" class="nav-link active">Register</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Join <span class="gradient-text">Us</span></h2>
            
            <form action="{{ url_for('register_page') }}" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" class="btn-submit">Create Account</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="/login">Sign In</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Rising Waters — A Machine Learning Approach to Flood Prediction</p>
        <p class="footer-sub">Rising Waters Project | AI & ML Track</p>
    </footer>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
